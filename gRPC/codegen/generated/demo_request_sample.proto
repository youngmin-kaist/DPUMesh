syntax = "proto3";
package demo;

message Inner {
  optional string note = 1;
  uint64 ts = 2;
}

message AttrEntryValue {
  oneof kind {
    uint64 num = 1;
    string text = 2;
  }
}

message Request {
  uint64 id = 1;
  optional string name = 2;
  Inner inner = 3;
  map<string, AttrEntryValue> attrs = 4;
  oneof payload {
    bytes raw = 5;
    Inner nested = 6;
  }
  repeated uint32 scores = 7 [packed = true];
}
